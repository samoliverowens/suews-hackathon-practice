  named neighbourhoods spanning refuge, core and hotspot archetypes, with a hot-humid
  land-cover skin and per-neighbourhood population. Building morphology drives z0/zd
  via Macdonald; vegetation, water and bare soil are carved from the non-building
  budget by archetype; population density (people/ha, day/night) is representative
  for a low-income tropical city. Anthropogenic-heat QF is off, so population is exposure
  data, not model heat.'
